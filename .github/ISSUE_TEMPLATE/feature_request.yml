name: Feature request
description: Suggest an improvement or a new vector editing workflow.
title: "feature: "
labels: [ enhancement ]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Please do not include API keys or other secrets.
        アイデアの共有ありがとうございます。APIキーなどの秘密情報は書かないでください。
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What are you trying to do, and where does Kiseki get in the way? / どんな作業をしていて、どこが困るか教えてください。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would make this easier? / どうなると使いやすいですか？
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Canvas editing
        - Paths and controls
        - Import or export
        - AI editing
        - ".ve format or MCP"
        - Documentation
        - Other
