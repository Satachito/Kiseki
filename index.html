<!DOCTYPE html>
<html lang=zxx>
<title>The Vector Editor</title>

<link rel=stylesheet href=index.css>

<header>
	<input type=image	id=SelectB		alt=Select		src=./res/Select.svg	class=selected >
	<input type=image	id=RectB		alt=Rect		src=./res/Rect.svg		>
	<input type=image	id=OvalB		alt=Oval		src=./res/Oval.svg		>
	<input type=image	id=LineB		alt=Line		src=./res/Line.svg		>
	<input type=image	id=CurveB		alt=Curve		src=./res/Curve.svg		>
	<input type=image	id=EraserB		alt=Eraser		src=./res/Eraser.svg	>
	<input type=image	id=PenB			alt=Pen			src=./res/Pen.svg		>
	<input type=image	id=ScissorsB	alt=Scissor		src=./res/Scissors.svg	>
	<input type=image	id=ChangeB		alt=Change		src=./res/Change.svg	>
	<input type=image	id=ReverseB		alt=Reverse		src=./res/Reverse.svg	>
	<input type=image	id=ForwardB		alt=Forward		src=./res/Forward.svg	>
	<input type=image	id=BackwardB	alt=Backward	src=./res/Backward.svg	>
	<input type=image	id=TieB			alt=Tie			src=./res/Tie.svg		>
	<input type=image	id=HandB		alt=Hand		src=./res/Hand.svg		>

	<span class="right cursive" style="font-size: 19px">VecEdit</span>
</header>

<nav id=NAV class=open>

	<div class=headline>Upload</div>
	<div class=padded>
		<input type=file	id=OfVEJB accept=.vej><label for=OfVEJB class=fileLabel>.vej</label>
		<div style="height: 4px"></div>
		<input type=file	id=OfSVGB accept=.svg><label for=OfSVGB class=fileLabel>.svg</label>
	</div>

	<div class=headline>Download</div>
	<div class=padded>
		<input type=text	id=VEJBaseName		value=VEJ>
		<a href=_blank		id=AsVEJA									>.vej</a><br>
		<input type=text	id=SVGBaseName		value=VEJ>
		<a href=_blank		id=AsSVGA									>.svg</a><br>
		<input type=text	id=EPSBaseName		value=VEJ>
		<a href=_blank		id=AsEPSA									>.eps</a><br>
	</div>

	<div class=headline>Edit</div>
	<div class=padded>
		<input type=image	id=InfoB		alt=Info				src=./res/Info.svg		>
		<input type=image	id=UndoB		alt=Undo				src=./res/Undo.svg		>
		<input type=image	id=RedoB		alt=Redo				src=./res/Redo.svg		>
		<hr>
		<input type=image	id=CutB			alt=Cut					src=./res/Cut.svg		>
		<input type=image	id=CopyB		alt=Copy				src=./res/Copy.svg		>
		<input type=image	id=PasteB		alt=Paste				src=./res/Paste.svg		>
		<input type=image	id=DeleteB		alt=Delete				src=./res/Delete.svg	>
		<input type=image	id=SelectAllB	alt="Select all"		src=./res/SelectAll.svg	>
		<hr>
		<input type=image	id=AlignLB		alt="Align left"		src=./res/AlignL.svg	>
		<input type=image	id=AlignRB		alt="Align right"		src=./res/AlignR.svg	>
		<input type=image	id=AlignTB		alt="Align top"			src=./res/AlignT.svg	>
		<input type=image	id=AlignBB		alt="Align bottom"		src=./res/AlignB.svg	>
		<br>
		<input type=image	id=MirrorHB		alt="Mirror horizontal"	src=./res/MirrorH.svg	>
		<input type=image	id=MirrorVB		alt="Mirror vertical"	src=./res/MirrorV.svg	>
		<input type=image	id=Rotate90RB	alt="Rotate right"		src=./res/RotateR.svg	>
		<input type=image	id=Rotate90LB	alt="Rotate left"		src=./res/RotateL.svg	>
		<hr>
		<div class=lr>
			<span>
				Angle:<input type=text	id=RotateAngle	value=0>
			</span>
			<input type=image	id=RotateB		alt=Rotate				src=./res/Rotate.svg	>
		</div>
		<hr>
		<div class=lr>
			<span>
				H:<input type=text	id=ResizeH		value=100>
				V:<input type=text	id=ResizeV		value=100>
			</span>
			<input type=image	id=ResizeB		alt=Resize				src=./res/Resize.svg	>
		</div>
	</div>

	<div class=headline>Display parameters</div>
	<div class=padded>
		<img type=image alt=PreviewPaneBackground src=./res/PreviewPaneBackground.svg>
		<input type=range id=PreviewR max=1 step=0.1 value=0.5	><br>
		<jp-color-picker	id=PrevCanvasBG	value=white	></jp-color-picker>
		<hr>
		<img type=image alt=ScrollPaneBackground src=./res/ScrollPaneBackground.svg>
		<input type=range id=SkeltonR max=1 step=0.1 value=1	><br>
		<hr>
		<jp-color-picker	id=ScrollPaneBG	value=#eee	></jp-color-picker>
		<hr>

		<div class=lr><img alt=Width				src=./res/Width.svg>	<input type=text id=Width	></div>
		<div class=lr><img alt=Height				src=./res/Height.svg>	<input type=text id=Height	></div>
		<div class=lr><img alt="Horizontal Margin"	src=./res/MarginH.svg>	<input type=text id=MarginH	></div>
		<div class=lr><img alt="Vertical Margin"	src=./res/MarginV.svg>	<input type=text id=MarginV	></div>
	</div>

	<div class=headline>Job List</div>
	<job-list id=JOB_LIST></job-list>

	<div class=headline>Debug</div>
	<div class=padded>
		<input type=button	id=TigerB		value="Load Tiger"		><br>
		<input type=button	id=IkyuB		value="Load Ikyu"		><br>
		<input type=button	id=QuatroArcB	value="Load QuatroArc"	><br>
		<input type=button	id=SVGLogoB		value="Load SVGLogo"	><br>
		<input type=button	id=TransformB	value="Load Transform"	><br>
		<input type=button	id=DebugB		value=Debug				><br>
		<hr>
		<input type=button	id=RemoveLSB	value="X web storage"	><br>
		<input type=image	id=LoadLSB		alt="Load web storage"	src=./res/LoadLocalStorage.svg	><br>
		<input type=image	id=CombineB		alt=Combine				src=./res/Combine.svg			><br>
	</div>
</nav>

<main id=MAIN>
	<canvas id=C_DEBUG	></canvas>
	<canvas id=C_PREV	></canvas>
	<canvas id=C_MAIN	tabindex=0></canvas>
</main>

<aside id=ASIDE class=open>
	<div class=headline>Properties</div>
	<div class=padded>
		<div class=lr>
			<label><input		id=PropIDC				type=checkbox			> id				</label>
			<input				id=PropIDValue			type=text				class=w80>
		</div>
		<div class=lr>
			<label><input		id=PropFillC			type=checkbox			> fill				</label>
			<jp-color-picker	id=PropFillStyle		value=black	></jp-color-picker>
		</div>
		<div class=lr>
			<label><input		id=PropFillRuleC		type=checkbox			> fill-rule			</label>
			<select				id=PropFillRuleValue>
				<option value=nonzero	>nonzero	</option>
				<option value=evenodd	>evenodd	</option>
			</select>
		</div>
		<div class=lr>
			<label><input		id=PropStrokeC			type=checkbox	checked	> stroke			</label>
			<jp-color-picker	id=PropStrokeStyle		value=black	></jp-color-picker>
		</div>
		<div class=lr>
			<label><input		id=PropOpacityC			type=checkbox			> opacity			</label>
			<input				id=PropOpacityValue		type=text		value=1	class=w80>
		</div>
		<div class=lr>
			<label><input		id=PropStrokeWidthC		type=checkbox			> stroke-width		</label>
			<input				id=PropStrokeWidthValue	type=text		value=1	class=w80>
		</div>
		<div class=lr>
			<label><input		id=PropLineCapC			type=checkbox			> stroke-linecap	</label>
			<select				id=PropLineCapValue>
				<option value=butt					>butt	</option>
				<option value=round					>round	</option>
				<option value=square				>square	</option>
				<option value=inherit selected		>inherit</option>
			</select>
		</div>
		<div class=lr>
			<label><input		id=PropLineJoinC		type=checkbox			> stroke-linejoin	</label>
			<select				id=PropLineJoinValue>
				<option value=miter					>miter	</option>
				<option value=round					>round	</option>
				<option value=bevel					>bevel	</option>
				<option value=inherit selected		>inherit</option>
			</select>
		</div>
		<div class=lr>
			<label><input		id=PropMiterLimitC		type=checkbox			> stroke-miterlimit	</label>
			<input				id=PropMiterLimitValue	type=text		value=1	class=w80>
		</div>
		<div class=lr>
			<label><input		id=PropDashArrayC		type=checkbox			> stroke-dasharray	</label>
			<input				id=PropDashArrayValue	type=text				class=w80>
		</div>
		<div class=lr>
			<label><input		id=PropDashOffsetC		type=checkbox			> stroke-dashoffset	</label>
			<input				id=PropDashOffsetValue	type=text		value=0	class=w80>
		</div>
	</div>

	<div class=headline>Layer selector</div>
	<div class=padded>
		<layer-tree id=LAYER></layer-tree>
	</div>
	<hr>

</aside>

<footer>
	<span id=COORDINATE></span>
	<span class="cursive right">©2021- SliP LLC, Tokyo. Written by Satoru Ogura.</span>
</footer>

<dialog id=RotateDialog>
	<div class=dialogBlocker>
		<label>Degree:</label><input id=RotateDialogDegree><br>
		<br>
		<br>
		<input id=RotateDialogOK		type=button value='OK'		class=default>
		<input id=RotateDialogCancel	type=button value='Cancel'>
	</div>
</dialog>

<dialog id=ResizeDialog>
	<div class=dialogBlocker>
		<label>X:</label><input id=ResizeDialogX><br>
		<label>Y:</label><input id=ResizeDialogY><br>
		<br>
		<br>
		<input id=ResizeDialogOK		type=button value='OK'		class=default>
		<input id=ResizeDialogCancel	type=button value='Cancel'>
	</div>
</dialog>

<script type=module src=JPColorPicker.js></script>
<script type=module src=index.js></script>
