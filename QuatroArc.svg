<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- 円弧への２つのフラグの効果により各円弧が描画される -->
  <path fill="none" stroke="black" stroke-width="1"
        d="M 0 100 L 200 100 M 100 0 L 100 200" />

  <path fill="none" stroke="red" stroke-width="10"
        d="M 60,100
           A 60 40 10 1 0 140,100" />

  <path fill="none" stroke="lime" stroke-width="10"
        d="M 60,100
           A 60 40 10 1 1 140,100" />

  <path fill="none" stroke="purple" stroke-width="10"
        d="M 60,100
           A 60 40 10 0 1 140,100" />

  <path fill="none" stroke="pink" stroke-width="10"
        d="M 60,100
           A 60 40 10 0 0 140,100" />
</svg>
